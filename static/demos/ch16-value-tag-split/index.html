<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>값과 꼬리표는 따로 산다</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-secondary: #f1f5f9;
    --bg-card: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --teal: hsl(173, 80%, 35%);
    --code-bg: #1e293b;
    --green: #10b981;
    --blue: #3b82f6;
    --amber: #f59e0b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-secondary: #1e293b;
      --bg-card: #0f172a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #334155;
      --teal: hsl(173, 80%, 45%);
      --code-bg: #0f172a;
    }
  }

  body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: transparent; color: var(--text-primary); line-height: 1.5; }
  .demo-container { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--bg-secondary); }
  .demo-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .demo-header h2 { font-size: 15px; font-weight: 700; }
  .demo-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .demo-body { padding: 26px 20px 30px; }

  .split {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }
  @media (max-width: 640px) {
    .split { grid-template-columns: 1fr; gap: 18px; }
    .arrow-col { transform: rotate(90deg); justify-self: center; }
  }

  .box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .box-title {
    padding: 10px 14px; font-size: 12px; font-weight: 700;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 7px;
  }
  .box-title .tag-kind { font-size: 10px; font-weight: 600; color: var(--text-muted); font-family: system-ui; margin-left: auto; }
  .box-title .ico { width: 18px; height: 18px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }

  .box.values .ico { background: var(--teal); }
  .box.tags .ico { background: var(--amber); }

  .box-body { padding: 12px; display: flex; flex-direction: column; gap: 9px; }

  /* 값 행 */
  .val-row {
    display: flex; align-items: baseline; gap: 8px;
    font-family: "SF Mono", "Fira Code", monospace; font-size: 13px;
    padding: 8px 10px; border-radius: 7px; background: var(--bg-secondary);
  }
  .val-row .k { color: var(--teal); font-weight: 700; }
  .val-row .c { color: var(--text-muted); }
  .val-row .v { color: var(--text-primary); font-weight: 600; }
  .val-row .slot-label { margin-left: auto; font-size: 9.5px; color: var(--text-muted); font-family: system-ui; }

  /* 꼬리표 행 */
  .tag-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 7px; background: var(--bg-secondary);
  }
  .tag-row .k {
    font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; font-weight: 700;
    color: var(--teal); min-width: 42px;
  }
  .bits { display: flex; gap: 5px; }
  .bit {
    font-family: "SF Mono", monospace; font-size: 10px; font-weight: 700;
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .bit.w { background: var(--green); }
  .bit.e { background: var(--blue); }
  .bit.c { background: var(--amber); }

  /* 화살표 */
  .arrow-col { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 4px; }
  .arrow-col .line { font-size: 20px; color: var(--teal); }
  .arrow-col .lbl { font-size: 9.5px; color: var(--text-muted); white-space: nowrap; }

  .caption { text-align: center; font-size: 12.5px; color: var(--text-secondary); margin-top: 24px; line-height: 1.7; }
  .caption strong { color: var(--text-primary); }
</style>
</head>
<body>
<div class="demo-container">
  <div class="demo-header">
    <h2>그림 3 · 값과 꼬리표는 따로 산다</h2>
    <p>값은 객체 본체에 그대로, 꼬리표는 바깥 별도 공간에 모아둔다.</p>
  </div>
  <div class="demo-body">
    <div class="split">
      <!-- 값: 객체 본체 -->
      <div class="box values">
        <div class="box-title"><span class="ico">▦</span> 객체 본체 (JSObject) <span class="tag-kind">값은 여기</span></div>
        <div class="box-body">
          <div class="val-row"><span class="k">name</span><span class="c">:</span> <span class="v">'기래'</span><span class="slot-label">인라인 저장</span></div>
          <div class="val-row"><span class="k">age</span><span class="c">:</span> <span class="v">30</span><span class="slot-label">인라인 저장</span></div>
        </div>
      </div>

      <!-- 화살표 -->
      <div class="arrow-col">
        <span class="line">→</span>
        <span class="lbl">꼬리표는<br>저기 가서 봐</span>
      </div>

      <!-- 꼬리표: 별도 공간 -->
      <div class="box tags">
        <div class="box-title"><span class="ico">🏷</span> 꼬리표 묶음 (DescriptorArray) <span class="tag-kind">한 벌만</span></div>
        <div class="box-body">
          <div class="tag-row">
            <span class="k">name</span>
            <span class="bits"><span class="bit w" title="writable">W</span><span class="bit e" title="enumerable">E</span><span class="bit c" title="configurable">C</span></span>
          </div>
          <div class="tag-row">
            <span class="k">age</span>
            <span class="bits"><span class="bit w" title="writable">W</span><span class="bit e" title="enumerable">E</span><span class="bit c" title="configurable">C</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="caption">
      값(<strong>'기래'</strong>, <strong>30</strong>)은 객체 안에 인라인으로 박혀 있지만,<br>
      꼬리표(<strong>W·E·C</strong>)는 바깥 <strong>별도 공간</strong>에 모여 산다. — 왜 따로 두는지는 다음 그림에서.
    </div>
  </div>
</div>

<script>
  function notifyHeight() {
    window.parent.postMessage({ type: 'demo-resize', height: document.body.scrollHeight }, '*');
  }
  window.addEventListener('resize', notifyHeight);
  window.addEventListener('load', notifyHeight);
  setTimeout(notifyHeight, 100);
</script>
</body>
</html>
